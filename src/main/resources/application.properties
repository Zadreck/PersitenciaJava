# ── Conexión a MySQL (Docker) ──────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/ra9db?serverTimezone=Europe/Madrid&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=ra9user
spring.datasource.password=ra9pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ────────────────────────────────────────────────────────
# update: crea tablas si no existen y altera columnas si cambia la entidad.
# Opciones: none | validate | update | create | create-drop
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ── Servidor ───────────────────────────────────────────────────────────────
server.port=8080
