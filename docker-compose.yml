services:
  mysql_ra9:
    image: mysql:8.4
    container_name: mysql_ra9
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: ra9db
      MYSQL_USER: ra9user
      MYSQL_PASSWORD: ra9pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_ra9_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "ra9user", "-pra9pass"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_ra9_data:
